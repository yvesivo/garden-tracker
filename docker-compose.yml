services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      # Wird vom Host übernommen; ohne Key liefert das Backend Demo-Wetterdaten
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
