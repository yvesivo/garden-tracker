spring.application.name=garden-tracker-backend

# H2 In-Memory Datenbank
spring.datasource.url=jdbc:h2:mem:gardendb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=always

server.port=8080

# OpenWeatherMap API (Schlüssel von openweathermap.org eintragen)
weather.api.key=REPLACE_WITH_YOUR_KEY
weather.api.base-url=https://api.openweathermap.org/data/2.5

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
